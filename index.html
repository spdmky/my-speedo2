<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart GPS Dash</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        #speed { font-size: clamp(100px, 30vw, 180px); font-weight: 900; line-height: 1; }
        #unit { font-size: 24px; margin-bottom: 20px; color: #008800; letter-spacing: 2px; }
        
        .stats-row { display: flex; gap: 40px; text-align: center; margin-bottom: 30px; }
        .label { font-size: 14px; color: #666; text-transform: uppercase; }
        .val { font-size: 32px; font-weight: bold; color: #fff; }

        button {
            background: #111;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { background: #00ff00; color: #000; }
        
        #status { position: fixed; bottom: 15px; font-size: 11px; color: #444; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div id="speed">0</div>
    <div id="unit">MPH</div>

    <div class="stats-row">
        <div>
            <div class="label">Max Speed</div>
            <div id="max-val" class="val">0</div>
        </div>
        <div>
            <div class="label">Trip Miles</div>
            <div id="trip-val" class="val">0.00</div>
        </div>
    </div>

    <button onclick="resetStats()">RESET TRIP</button>

    <div id="status">Initializing Sensors...</div>

    <script>
        // --- GLOBAL VARIABLES ---
        let maxSpeed = 0;
        let totalDistanceMeters = 0;
        let lastPosition = null;
        let wakeLock = null;
        let isPhysicallyMoving = false;

        const speedEl = document.getElementById('speed');
        const maxEl = document.getElementById('max-val');
        const tripEl = document.getElementById('trip-val');
        const statusEl = document.getElementById('status');

        // 1. MOTION SENSOR (Accelerometer) 
        // Checks if the phone is physically vibrating/moving
        if ('DeviceMotionEvent' in window) {
            window.addEventListener('devicemotion', (event) => {
                const acc = event.acceleration; 
                if (!acc) return;
                // Magnitude calculation: sqrt(x^2 + y^2 + z^2)
                const motion = Math.sqrt((acc.x || 0)**2 + (acc.y || 0)**2 + (acc.z || 0)**2);
                isPhysicallyMoving = motion > 0.3; // Threshold for vehicle vibration
            });
        }

        // 2. WAKE LOCK (Keep Screen On)
        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log("WakeLock error: " + err.message);
            }
        };
        requestWakeLock();
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') requestWakeLock();
        });

        // 3. DISTANCE CALCULATION (Haversine)
        function calculateDistance(lat1, lon1, lat2, lon2) {
