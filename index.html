<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>GPS Dash Pro</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00; /* Neon Green */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }
        #speed { font-size: clamp(100px, 30vw, 180px); font-weight: 900; line-height: 1; }
        #unit { font-size: 24px; margin-bottom: 20px; color: #008800; letter-spacing: 2px; }
        
        .stats-row { display: flex; gap: 40px; text-align: center; margin-bottom: 30px; }
        .label { font-size: 14px; color: #444; text-transform: uppercase; }
        
        /* Default value color matches the MPH label */
        .val { font-size: 32px; font-weight: bold; color: #008800; transition: color 0.3s; }
        
        /* This class will be added via Script when the odometer is "Live" */
        .active-tick { color: #00ff00 !important; text-shadow: 0 0 10px #00ff00; }

        button {
            background: #111;
            color: #008800;
            border: 1px solid #008800;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { background: #008800; color: #000; }
        
        #status { position: fixed; bottom: 15px; font-size: 10px; color: #222; }
    </style>
</head>
<body>

    <div id="speed">0</div>
    <div id="unit">MPH</div>

    <div class="stats-row">
        <div>
            <div class="label">Max Speed</div>
            <div id="max-val" class="val">0</div>
        </div>
        <div>
            <div class="label">Trip Miles</div>
            <div id="trip-val" class="val">0.00</div>
        </div>
    </div>

    <button onclick="resetStats()">RESET TRIP</button>

    <div id="status">Ready</div>

    <script>
        let maxSpeed = 0;
        let totalDistanceMeters = 0;
        let lastPosition = null;
        let wakeLock = null;
        let motionScore = 0;

        const speedEl = document.getElementById('speed');
        const maxEl = document.getElementById('max-val');
        const tripEl = document.getElementById('trip-val');
        const statusEl = document.getElementById('status');

        // MOTION SENSOR
        if ('DeviceMotionEvent' in window) {
            window.addEventListener('devicemotion', (event) => {
                const acc = event.acceleration; 
                if (!acc) return;
                const motion = Math.sqrt((acc.x || 0)**2 + (acc.y || 0)**2 + (acc.z || 0)**2);
                if (motion > 0.4) {
                    if (motionScore < 10) motionScore++; 
                } else {
                    if (motionScore > 0) motionScore--;
                }
            });
        }

        // WAKE LOCK
        const requestWakeLock = async () => {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        };
        requestWakeLock();

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                const coords = pos.coords;
                const rawSpeed = coords.speed || 0;
                const mph = Math.round(rawSpeed * 2.23694);

                speedEl.innerText = mph;

                if (mph > maxSpeed) {
                    maxSpeed = mph;
                    maxEl.innerText = maxSpeed;
                }

                // --- VISUAL QUEUE LOGIC ---
                // Is the "Gate" open? (Speed > 2mph AND moving)
                if (rawSpeed > 0.9 && motionScore > 3) {
                    tripEl.classList.add('active-tick'); // Turn Neon Green
                    
                    if (lastPosition) {
                        const dist = calculateDistance(
                            lastPosition.latitude, lastPosition.longitude,
                            coords.latitude, coords.longitude
                        );
                        if (dist > 4 && dist < 200) {
                            totalDistanceMeters += dist;
                            tripEl.innerText = (totalDistanceMeters * 0.000621371).toFixed(2);
                        }
                    }
                } else {
                    tripEl.classList.remove('active-tick'); // Back to Dark Green
                }

                lastPosition = coords;
                statusEl.innerText = "GPS Accuracy: " + Math.round(coords.accuracy) + "m";
            }, (err) => {
                statusEl.innerText = "Error: " + err.message;
            }, { enableHighAccuracy: true, maximumAge: 0 });
        }

        function resetStats() {
            maxSpeed = 0;
            totalDistanceMeters = 0;
            maxEl.innerText = "0";
            tripEl.innerText = "0.00";
        }
    </script>
</body>
</html>
